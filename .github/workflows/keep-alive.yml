name: Keep Workflows Active

on:
  schedule:
    # 毎月1日 UTC 00:00 に実行（60日非アクティブによるワークフロー自動無効化を防ぐ）
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep workflows active
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit --allow-empty -m 'chore: keep workflows active [skip ci]'
          git push

name: Daily AI News Digest

on:
  schedule:
    # UTC 00:00 = JST 09:00 (primary)
    - cron: '0 0 * * *'
    # UTC 04:00 = JST 13:00 (backup: primary がスキップされた場合のみ送信)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_send: ${{ steps.dedup.outputs.should_send }}
    permissions:
      actions: read
    steps:
      - name: 本日送信済みか確認
        id: dedup
        run: |
          # workflow_dispatch は常に送信
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          echo "確認日付: $TODAY"
          # 本日の成功ランを確認（現在のランは in-progress のため含まれない）
          if gh run list --repo "$GITHUB_REPOSITORY" --workflow=daily-news.yml --status=success --limit=10 | grep -q "$TODAY"; then
            echo "should_send=false" >> $GITHUB_OUTPUT
            echo "本日 ($TODAY) は既に送信済みです。バックアップ実行をスキップします。"
          else
            echo "should_send=true" >> $GITHUB_OUTPUT
            echo "本日 ($TODAY) の送信が未確認。メール送信を実行します。"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  send-digest:
    needs: check
    if: needs.check.outputs.should_send == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send daily digest
        run: pnpm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NODE_ENV: production
